<div class="topbar">
  <div>
    <div class="page-title">Hola, <span class="empresa-nombre">—</span></div>
    <div class="page-subtitle">Resumen general de movimientos</div>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-primary" onclick="APP.navegar('digitacion')">
      + Nuevo movimiento
    </button>
  </div>
</div>

<div class="stats-grid">
  <div class="stat-card verde">
    <div class="stat-label">Total entradas</div>
    <div class="stat-value" id="stat-entradas">$0</div>
    <div class="stat-desc">Acumulado</div>
  </div>
  <div class="stat-card rojo">
    <div class="stat-label">Total salidas</div>
    <div class="stat-value" id="stat-salidas">$0</div>
    <div class="stat-desc">Acumulado</div>
  </div>
  <div class="stat-card azul">
    <div class="stat-label">Balance</div>
    <div class="stat-value" id="stat-balance">$0</div>
    <div class="stat-desc">Entradas − Salidas</div>
  </div>
  <div class="stat-card naranja">
    <div class="stat-label">Movimientos</div>
    <div class="stat-value" id="stat-count">0</div>
    <div class="stat-desc">Total registrados</div>
  </div>
</div>

<div class="table-section">
  <div class="table-header">
    <div class="table-title">Últimos movimientos</div>
    <button class="btn btn-ghost" style="font-size:12px"
      onclick="APP.navegar('movimientos')">Ver todos →</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>Fecha</th><th>Cuenta</th><th>Proveedor</th>
        <th>Método</th><th>Tipo</th><th>Valor</th>
      </tr>
    </thead>
    <tbody id="tbody-recientes">
      <tr><td colspan="6"
        style="text-align:center;padding:28px;color:var(--muted)">
        Sin movimientos aún</td></tr>
    </tbody>
  </table>
</div>
